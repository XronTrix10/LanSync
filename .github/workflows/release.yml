name: Build and Publish LanSync

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release Version (e.g., v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: windows-amd64
            build_flags: "-nsis" # Generates a nice Windows installer
          - os: macos-latest
            platform: darwin/amd64
            artifact_name: macos-amd64
            build_flags: ""
          - os: macos-latest
            platform: darwin/arm64 # Apple Silicon
            artifact_name: macos-arm64
            build_flags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: linux-amd64
            build_flags: "-tags webkit2_41"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS Compiler
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Sync Desktop & Frontend Versions
        working-directory: ./desktop
        run: |
          # 1. Clean the version string (removes 'v' if present)
          VERSION="${{ github.event.inputs.version }}"
          CLEAN_VERSION="${VERSION#v}"

          # 2. Update Wails config
          node -e "const fs = require('fs'); const d = JSON.parse(fs.readFileSync('wails.json')); d.info.productVersion = '$CLEAN_VERSION'; d.info.fileVersion = '$CLEAN_VERSION'; fs.writeFileSync('wails.json', JSON.stringify(d, null, 2));"

          # 3. Update React frontend (package.json & package-lock.json)
          cd frontend
          npm version $CLEAN_VERSION --no-git-tag-version --allow-same-version

      - name: Build Wails App
        working-directory: ./desktop
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build_flags }}

      - name: Package Mac App (Preserve Permissions)
        if: runner.os == 'macOS'
        working-directory: ./desktop/build/bin
        run: zip -qr lansync-${{ matrix.artifact_name }}.zip LanSync.app

      - name: Package Windows Installer
        if: runner.os == 'Windows'
        working-directory: ./desktop/build/bin
        run: |
          $installer = Get-ChildItem -Filter "*-installer.exe"
          if ($installer) {
              Rename-Item -Path $installer.FullName -NewName "lansync-setup.exe" -Force
              Remove-Item -Path "LanSync.exe" -ErrorAction SilentlyContinue
          } else {
              Write-Host "NSIS Installer not found. Using raw executable instead."
              Rename-Item -Path "LanSync.exe" -NewName "lansync-setup.exe" -Force
          }

      - name: Package Linux .deb
        if: runner.os == 'Linux'
        working-directory: ./desktop/build/bin
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CLEAN_VERSION="${VERSION#v}"

          mkdir -p lansync_deb/usr/bin
          mkdir -p lansync_deb/usr/share/applications
          mkdir -p lansync_deb/usr/share/icons/hicolor/512x512/apps
          mkdir -p lansync_deb/DEBIAN

          # Copy the binary for the .deb, leaving the original intact for the tar.gz
          cp LanSync lansync_deb/usr/bin/lansync
          chmod +x lansync_deb/usr/bin/lansync

          cat <<EOF > lansync_deb/DEBIAN/control
          Package: lansync
          Version: $CLEAN_VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: LanSync Developer
          Description: A blazing-fast, cross-platform local network synchronization tool.
          EOF

          cat <<EOF > lansync_deb/usr/share/applications/lansync.desktop
          [Desktop Entry]
          Name=LanSync
          Comment=Local file and clipboard sync
          Exec=/usr/bin/lansync
          Icon=lansync
          Terminal=false
          Type=Application
          Categories=Network;FileTransfer;Utility;
          EOF

          cp ../appicon.png lansync_deb/usr/share/icons/hicolor/512x512/apps/lansync.png 2>/dev/null || true

          dpkg-deb --build lansync_deb lansync-linux-amd64.deb

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # Uploads zips, installers, .deb files, AND the raw binary (for tarballing)
          path: |
            desktop/build/bin/*.exe
            desktop/build/bin/*.zip
            desktop/build/bin/*.deb
            desktop/build/bin/LanSync

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Sync Android Versions
        working-directory: ./mobile/app
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CLEAN_VERSION="${VERSION#v}"

          # 1. Parse version into an auto-incrementing integer (1.2.3 -> 10203)
          IFS='.' read -r major minor patch <<< "$CLEAN_VERSION"
          VERSION_CODE=$((major * 10000 + minor * 100 + patch))

          # 2. Inject the String Version Name
          sed -i "s/versionName = \".*\"/versionName = \"$CLEAN_VERSION\"/g" build.gradle.kts

          # 3. Inject the Integer Version Code
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/g" build.gradle.kts

      - name: Make Gradle executable
        working-directory: ./mobile
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: ./mobile
        run: ./gradlew assembleDebug

      - name: Rename APK
        working-directory: ./mobile/app/build/outputs/apk/debug
        run: mv app-debug.apk lansync_debug.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/app/build/outputs/apk/debug/lansync_debug.apk

  publish:
    name: Publish Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets for Release
        run: |
          # Specifically tarball ONLY the raw executable, ignoring the .deb package
          cd artifacts/linux-amd64 && tar -czvf ../../lansync-linux-amd64.tar.gz LanSync && cd ../../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: LanSync ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/macos-amd64/lansync-macos-amd64.zip
            artifacts/macos-arm64/lansync-macos-arm64.zip
            lansync-linux-amd64.tar.gz
            artifacts/linux-amd64/lansync-linux-amd64.deb
            artifacts/windows-amd64/lansync-setup.exe
            artifacts/android-apk/lansync_debug.apk
