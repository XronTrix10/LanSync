name: Build and Publish LanSync

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release Version (e.g., v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: windows-amd64
            build_flags: "-nsis" # Generates a nice Windows installer
          - os: macos-latest
            platform: darwin/amd64
            artifact_name: macos-amd64
            build_flags: ""
          - os: macos-latest
            platform: darwin/arm64 # Apple Silicon
            artifact_name: macos-arm64
            build_flags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: linux-amd64
            build_flags: "-tags webkit2_41"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        # Guarantees the NSIS compiler is available for Wails
        run: choco install nsis -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        working-directory: ./desktop
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build_flags }}

      - name: Package Mac App (Preserve Permissions)
        if: runner.os == 'macOS'
        working-directory: ./desktop/build/bin
        run: zip -qr lansync-${{ matrix.artifact_name }}.zip LanSync.app

      - name: Package Windows Installer
        if: runner.os == 'Windows'
        working-directory: ./desktop/build/bin
        # Smart PowerShell script to gracefully find, rename, and clean up
        run: |
          $installer = Get-ChildItem -Filter "*-installer.exe"
          if ($installer) {
              Rename-Item -Path $installer.FullName -NewName "lansync-setup.exe" -Force
              Remove-Item -Path "LanSync.exe" -ErrorAction SilentlyContinue
          } else {
              Write-Host "NSIS Installer not found. Using raw executable instead."
              Rename-Item -Path "LanSync.exe" -NewName "lansync-setup.exe" -Force
          }

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            desktop/build/bin/*.exe
            desktop/build/bin/*.zip
            desktop/build/bin/LanSync

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Make Gradle executable
        working-directory: ./mobile
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: ./mobile
        run: ./gradlew assembleDebug

      - name: Rename APK
        working-directory: ./mobile/app/build/outputs/apk/debug
        run: mv app-debug.apk lansync_debug.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/app/build/outputs/apk/debug/lansync_debug.apk

  publish:
    name: Publish Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows GitHub Actions to create the release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets for Release
        run: |
          # Linux binaries still need to be tarballed to preserve permissions
          cd artifacts/linux-amd64 && tar -czvf ../../lansync-linux-amd64.tar.gz . && cd ../../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: LanSync ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/macos-amd64/lansync-macos-amd64.zip
            artifacts/macos-arm64/lansync-macos-arm64.zip
            lansync-linux-amd64.tar.gz
            artifacts/windows-amd64/lansync-setup.exe
            artifacts/android-apk/lansync_debug.apk
